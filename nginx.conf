# ================================================================
# Nirmalayam Krafts — Nginx Production Configuration
# Serves the React 19 SPA and reverse-proxies API to backend.
# ================================================================

server {
    listen 80;
    server_name _;

    # Document root for compiled Vite assets
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ─────────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security Headers ────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options    "nosniff"                      always;
    add_header X-XSS-Protection         "1; mode=block"                always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=()"  always;

    # ── Health Check ─────────────────────────────────────────────
    # Docker HEALTHCHECK and load balancers probe this endpoint.
    location = /health {
        access_log  off;
        add_header  Content-Type text/plain;
        return 200  "healthy\n";
    }

    # ── Backend API Proxy ────────────────────────────────────────
    # All /api/* requests are proxied internally to the backend
    # container on port 3010. The frontend SPA uses VITE_API_BASE_URL=/api.
    location /api/ {
        proxy_pass              http://backend:3010/api/;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection        "";
        proxy_read_timeout      60s;
        proxy_connect_timeout   10s;
        proxy_send_timeout      60s;

        # Do not cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Swagger Docs Proxy ───────────────────────────────────────
    location /api-docs/ {
        proxy_pass            http://backend:3010/api-docs/;
        proxy_http_version    1.1;
        proxy_set_header      Host            $host;
        proxy_set_header      X-Real-IP       $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Backend Health Check Passthrough ─────────────────────────
    location = /backend-health {
        proxy_pass http://backend:3010/health;
        proxy_http_version 1.1;
        access_log off;
    }

    # ── Static Asset Caching ─────────────────────────────────────
    # Vite generates content-hashed filenames — safe to cache aggressively.
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif|map)$ {
        expires         1y;
        add_header      Cache-Control "public, immutable, no-transform";
        access_log      off;
        try_files       $uri =404;
    }

    # ── SPA Client-Side Routing Fix ──────────────────────────────
    # CRITICAL: react-router-dom uses history API for navigation.
    # Without try_files, any hard reload of a deep route (e.g. /dashboard/leads)
    # would return a 404 from Nginx. This rule falls back to index.html for all
    # unmatched paths, letting React Router handle routing on the client side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Error Pages ──────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
